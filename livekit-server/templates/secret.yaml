{{- if and (not .Values.storeKeysInSecret.existingSecret) .Values.storeKeysInSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "livekit-server.fullname" . }}
  labels:
    {{- include "livekit-server.labels" . | nindent 4 }}
data:
  {{  .Values.livekit.key_file }}: {{ toYaml .Values.storeKeysInSecret.keys | b64enc }}
{{- end }}

{{- if and .Values.livekit.prometheus .Values.livekit.prometheus.username .Values.livekit.prometheus.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "livekit-server.serviceMonitorSecretName" . }}
  labels:
    {{- include "livekit-server.labels" . | nindent 4 }}
data:
    username: {{ .Values.livekit.prometheus.username | b64enc }}
    password: {{ .Values.livekit.prometheus.password | b64enc }}
{{- end }}
